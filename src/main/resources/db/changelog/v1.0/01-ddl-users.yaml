databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: dev
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: first_name
                  type: varchar(255)

              - column:
                  name: last_name
                  type: varchar(255)

              - column:
                  name: role
                  type: varchar(50)
                  defaultValue: user
                  constraints:
                    nullable: false

              - column:
                  name: is_blocked
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false