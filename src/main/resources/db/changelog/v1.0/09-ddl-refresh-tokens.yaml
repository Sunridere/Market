databaseChangeLog:
  - changeSet:
      id: 009-create-refresh-tokens
      author: dev
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: token
                  type: varchar
                  constraints:
                    unique: true

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: revoked
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: false

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_token_user