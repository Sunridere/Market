databaseChangeLog:
  - changeSet:
      id: 008-create-product-images
      author: dev
      changes:
        - createTable:
            tableName: product_images
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: product_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: image_url
                  type: varchar(500)
                  constraints:
                    nullable: false

              - column:
                  name: is_main
                  type: boolean
                  defaultValueBoolean: false

        - addForeignKeyConstraint:
            baseTableName: product_images
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_product_images_product
