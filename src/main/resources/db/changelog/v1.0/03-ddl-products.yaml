databaseChangeLog:
  - changeSet:
      id: 003-create-products
      author: dev
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: text

              - column:
                  name: price
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: stock_quantity
                  type: integer

              - column:
                  name: category_id
                  type: uuid
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            referencedTableName: category
            referencedColumnNames: id
            constraintName: fk_products_category