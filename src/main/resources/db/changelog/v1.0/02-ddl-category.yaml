databaseChangeLog:
  - changeSet:
      id: 002-create-category
      author: dev
      changes:
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true